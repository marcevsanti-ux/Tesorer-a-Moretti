<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tesorería Moretti · Snapshot</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#D4000A;--black:#080808;--dark:#0F0F0F;--surf:#141414;
  --surf2:#1C1C1C;--surf3:#242424;--brd:#222222;--brd2:#2E2E2E;
  --txt:#EFEFEF;--txt2:#8A8A8A;--txt3:#444444;
  --green:#16A34A;--green-lt:#4ADE80;--amber:#D97706;--amber-lt:#FCD34D;
}
html,body{min-height:100%;background:var(--black);color:var(--txt);font-family:'Inter',sans-serif;font-size:13px;}
header{background:rgba(8,8,8,0.96);border-bottom:1px solid var(--brd);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:14px}
.brand-label{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.12em;color:var(--txt2)}
.brand-label span{color:var(--red)}
.snap-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txt3)}
main{max-width:1440px;margin:0 auto;padding:24px 28px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.1em;color:#fff;margin-bottom:16px}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:18px 20px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),transparent)}
.kpi-label{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px}
.kpi-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.04em;color:#fff;line-height:1}
.kpi-val.danger{color:var(--red)}
.kpi-val.warn{color:var(--amber-lt)}
.kpi-val.good{color:var(--green-lt)}
.kpi-sub{font-size:10px;color:var(--txt3);margin-top:6px;font-weight:500}
.kpi-grid-recover{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.kpi-recover{background:linear-gradient(135deg,rgba(74,222,128,.08),rgba(74,222,128,.03));border:1px solid rgba(74,222,128,.25);border-radius:10px;padding:20px 24px;position:relative;overflow:hidden}
.kpi-recover::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#4ade80,transparent)}
.kpi-recover .kpi-label{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#4ade80;margin-bottom:8px}
.kpi-recover .kpi-val{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.04em;color:#4ade80;line-height:1}
.kpi-recover .kpi-sub{font-size:11px;color:rgba(74,222,128,.7);margin-top:6px;font-weight:600}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:20px 24px}
.card-title{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--txt3);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:3px;height:10px;background:var(--red);border-radius:2px;flex-shrink:0}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-row:last-child{margin-bottom:0}
.bar-lbl{font-size:11px;font-weight:500;color:var(--txt2);width:145px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.bar-track{flex:1;height:6px;background:var(--surf3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--red)}
.bar-fill.gold{background:linear-gradient(90deg,var(--amber),var(--amber-lt))}
.bar-val{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;color:var(--txt3);width:68px;text-align:right;flex-shrink:0}
footer{border-top:1px solid var(--brd);padding:10px 28px;display:flex;align-items:center;justify-content:space-between}
.ftr-left{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3)}
.ftr-right{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--txt3)}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:16px;color:var(--txt3)}
.spinner{width:32px;height:32px;border:2px solid var(--brd2);border-top-color:var(--red);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.2em;color:var(--txt3)}
#error-msg{display:none;padding:40px;text-align:center;color:#f87171;font-size:14px;font-weight:600}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-label">Tesorería <span>·</span> Moretti S.A.</div>
  </div>
  <div class="snap-date" id="snapDate">—</div>
</header>

<main id="main">
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-txt">Cargando dashboard</div>
  </div>
  <div id="error-msg">⚠️ Token inválido o error de acceso</div>
</main>

<footer>
  <div class="ftr-left">Moretti S.A. · Sistema de Tesorería · <span style="color:var(--red)">v2.4.5</span></div>
  <div class="ftr-right" id="ftrDate"></div>
</footer>

<script>
const SNAPSHOT_TOKEN = 'tes_snap_moretti_2026';
const { createClient } = supabase;
const sb = createClient(
  'https://qqmzhwifrkgfrgewmpig.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxbXpod2lmcmtnZnJnZXdtcGlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTg4MzcsImV4cCI6MjA4OTI3NDgzN30.4W-n_WLRvcrE385qv0Phil4PrHrb1twpsZvxxIHodeg'
);

function fmt(n){
  if(!n&&n!==0)return'—';
  return'$'+Number(n).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtK(n){
  if(!n)return'—';
  if(n>=1000000000)return'$'+(n/1000000000).toFixed(1)+'B';
  if(n>=1000000)return'$'+(n/1000000).toFixed(1)+'M';
  if(n>=1000)return'$'+(n/1000).toFixed(0)+'k';
  return'$'+n.toFixed(0);
}

async function loadSnapshot(){
  // Verificar token
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if(token !== SNAPSHOT_TOKEN){
    document.getElementById('loading').style.display='none';
    document.getElementById('error-msg').style.display='block';
    return;
  }

  // Fecha
  const now = new Date();
  const fecha = now.toLocaleDateString('es-AR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  const hora = now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('snapDate').textContent = fecha + ' · ' + hora;
  document.getElementById('ftrDate').textContent = 'Generado: ' + fecha + ' ' + hora;

  try{
    const [{data:rech},{data:canc}] = await Promise.all([
      sb.from('cheques').select('pendiente,importe,gastos,dias_mora,motivo,cliente').eq('hoja','RECHAZADOS'),
      sb.from('cheques').select('importe').eq('hoja','CANCELADOS')
    ]);

    const rechazados = rech||[];
    const cancelados = canc||[];
    const activos = rechazados.filter(r=>(r.pendiente||0)>0);
    const totalPendiente = activos.reduce((s,r)=>s+Number(r.pendiente||0),0);
    const totalImporte = rechazados.reduce((s,r)=>s+Number(r.importe||0),0);
    const totalGastos = rechazados.reduce((s,r)=>s+Number(r.gastos||0),0);
    const moraProm = activos.length ? Math.round(activos.reduce((s,r)=>s+Number(r.dias_mora||0),0)/activos.length) : 0;
    const montoRecuperado = cancelados.reduce((s,r)=>s+Number(r.importe||0),0);
    const cantRegistrados = rechazados.length + cancelados.length;
    const ratio = cantRegistrados>0 ? Math.round(cancelados.length/cantRegistrados*100) : 0;

    // Por motivo
    const porMotivo={};
    activos.forEach(r=>{
      const m=r.motivo||'SIN MOTIVO';
      if(!porMotivo[m])porMotivo[m]={cant:0,total:0};
      porMotivo[m].cant++;
      porMotivo[m].total+=Number(r.pendiente||0);
    });
    const mots = Object.entries(porMotivo).sort((a,b)=>b[1].total-a[1].total);
    const maxM = mots[0]?.[1].total||1;

    // Por cliente
    const porCliente={};
    activos.forEach(r=>{
      const c=r.cliente||'SIN NOMBRE';
      if(!porCliente[c])porCliente[c]=0;
      porCliente[c]+=Number(r.pendiente||0);
    });
    const topC = Object.entries(porCliente).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const maxC = topC[0]?.[1]||1;

    document.getElementById('loading').style.display='none';
    document.getElementById('main').innerHTML = `
    <div style="margin-bottom:20px">
      <div class="section-title">Panel General <span style="font-size:12px;color:var(--txt3);font-family:'Inter',sans-serif;font-weight:400;letter-spacing:0">· Base Supabase PostgreSQL</span></div>
    </div>

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Total Pendiente</div><div class="kpi-val danger">${fmt(totalPendiente)}</div><div class="kpi-sub">${activos.length} cheques activos</div></div>
      <div class="kpi"><div class="kpi-label">Importe Total</div><div class="kpi-val">${fmt(totalImporte)}</div><div class="kpi-sub">${rechazados.length} rechazados registrados</div></div>
      <div class="kpi"><div class="kpi-label">Gastos Bancarios</div><div class="kpi-val warn">${fmt(totalGastos)}</div><div class="kpi-sub">Cargos acumulados</div></div>
      <div class="kpi"><div class="kpi-label">Mora Promedio</div><div class="kpi-val ${moraProm>90?'danger':moraProm>45?'warn':'good'}">${moraProm>0?moraProm:'—'}</div><div class="kpi-sub">días promedio</div></div>
      <div class="kpi"><div class="kpi-label">Total Registrados</div><div class="kpi-val">${cantRegistrados}</div><div class="kpi-sub">rechazados + recuperados</div></div>
    </div>

    <div class="kpi-grid-recover">
      <div class="kpi-recover">
        <div class="kpi-label">● Cheques Recuperados</div>
        <div class="kpi-val">${cancelados.length}</div>
        <div class="kpi-sub">${fmt(montoRecuperado)} recuperado · ratio ${ratio}% del total</div>
      </div>
      <div class="kpi-recover">
        <div class="kpi-label">● Monto Recuperado</div>
        <div class="kpi-val" style="font-size:28px">${fmt(montoRecuperado)}</div>
        <div class="kpi-sub">${cancelados.length} cheques cancelados · sobre ${fmt(totalImporte+montoRecuperado)} total histórico</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="card">
        <div class="card-title">Pendiente por Motivo</div>
        ${mots.map(([m,d])=>`<div class="bar-row">
          <div class="bar-lbl" title="${m}">${m}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.total/maxM*100)}%"></div></div>
          <div class="bar-val">${fmtK(d.total)}</div>
        </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title">Top Clientes por Deuda</div>
        ${topC.map(([c,v],i)=>`<div class="bar-row">
          <div class="bar-lbl" title="${c}">${c}</div>
          <div class="bar-track"><div class="bar-fill ${i>0?'gold':''}" style="width:${Math.round(v/maxC*100)}%"></div></div>
          <div class="bar-val">${fmtK(v)}</div>
        </div>`).join('')}
      </div>
    </div>`;

  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('error-msg').textContent='❌ Error: '+e.message;
    document.getElementById('error-msg').style.display='block';
  }
}

document.addEventListener('DOMContentLoaded', loadSnapshot);
</script>
</body>
</html>
