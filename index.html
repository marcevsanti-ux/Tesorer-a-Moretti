<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tesorería · Moretti S.A.</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:       #D4000A;
  --red2:      #A8000A;
  --red-glow:  rgba(212,0,10,0.15);
  --black:     #080808;
  --dark:      #0F0F0F;
  --surf:      #141414;
  --surf2:     #1C1C1C;
  --surf3:     #242424;
  --brd:       #222222;
  --brd2:      #2E2E2E;
  --txt:       #EFEFEF;
  --txt2:      #8A8A8A;
  --txt3:      #444444;
  --green:     #16A34A;
  --green-lt:  #4ADE80;
  --amber:     #D97706;
  --amber-lt:  #FCD34D;
}

html,body{
  min-height:100%;
  background:var(--black);
  color:var(--txt);
  font-family:'Inter',sans-serif;
  font-size:13px;
  -webkit-font-smoothing:antialiased;
}

/* ── SCROLLBAR ─────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--red2)}

/* ── HEADER ────────────────────────────────────── */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(8,8,8,0.96);
  border-bottom:1px solid var(--brd);
  backdrop-filter:blur(12px);
}
.hdr{
  max-width:1600px;margin:0 auto;
  padding:0 28px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:14px}
.brand-logo{
  height:30px;
  /* Logo oficial Moretti */
}
.brand-logo img{height:30px;width:auto;display:block;filter:brightness(0) invert(1)}
.brand-divider{width:1px;height:24px;background:var(--brd2)}
.brand-label{
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:.12em;
  color:var(--txt2);line-height:1;
}
.brand-label span{color:var(--red)}

.hdr-right{display:flex;align-items:center;gap:6px}
.sync-pill{
  display:flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:20px;
  background:var(--surf2);border:1px solid var(--brd);
  font-size:10px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--txt3);
  transition:.2s;
}
.sync-pill.ok{color:var(--green-lt);border-color:rgba(74,222,128,.15);background:rgba(22,163,74,.06)}
.sync-pill.loading{color:var(--amber-lt);border-color:rgba(252,211,77,.1);background:rgba(217,119,6,.05)}
.sync-pill.error{color:#f87171;border-color:rgba(212,0,10,.2);background:rgba(212,0,10,.06)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.sync-pill.loading .sync-dot{animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

.icon-btn{
  width:34px;height:34px;border:none;
  background:transparent;color:var(--txt3);
  cursor:pointer;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.icon-btn:hover{background:var(--surf2);color:var(--txt)}
.icon-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── NAV ───────────────────────────────────────── */
.nav{
  background:var(--dark);
  border-bottom:1px solid var(--brd);
}
.nav-inner{
  max-width:1600px;margin:0 auto;
  padding:0 28px;display:flex;gap:0;
}
.tab{
  padding:12px 20px;
  font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--txt3);border:none;background:transparent;
  cursor:pointer;position:relative;transition:.2s;
  border-bottom:2px solid transparent;
}
.tab::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;
  height:2px;background:var(--red);
  transform:scaleX(0);transition:.2s ease;
}
.tab:hover{color:var(--txt2)}
.tab.active{color:#fff}
.tab.active::after{transform:scaleX(1)}

/* ── MAIN ──────────────────────────────────────── */
#app{display:flex;flex-direction:column;min-height:100vh}
main{flex:1;max-width:1600px;width:100%;margin:0 auto;padding:28px}

/* ── SECTION HEADER ────────────────────────────── */
.section-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:20px;flex-wrap:wrap;
}
.section-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:.1em;color:#fff;
}
.section-sub{font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase}
.btn-new{
  display:flex;align-items:center;gap:7px;
  padding:8px 16px;background:var(--red);border:none;
  border-radius:8px;color:#fff;font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
  font-family:'Inter',sans-serif;transition:.15s;margin-left:auto;
}
.btn-new:hover{background:var(--red2)}
.btn-new svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.nc-tabs{display:flex;gap:0;border-bottom:1px solid var(--brd);margin-bottom:20px}
.nc-tab{padding:9px 16px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;font-family:'Inter',sans-serif;}
.nc-tab.active{color:#fff;border-bottom-color:var(--red)}
.ai-drop{border:2px dashed var(--brd2);border-radius:10px;padding:32px;text-align:center;cursor:pointer;transition:.2s;position:relative;}
.ai-drop:hover,.ai-drop.drag{border-color:var(--red);background:rgba(212,0,10,.04)}
.ai-drop input[type=file]{display:none}
.ai-drop svg{width:32px;height:32px;stroke:var(--txt3);fill:none;stroke-width:1.5;margin:0 auto 10px;display:block}
.ai-result{background:rgba(212,0,10,.06);border:1px solid rgba(212,0,10,.2);border-radius:8px;padding:14px 16px;margin-bottom:16px;}
.ai-result-title{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ai-scanning{display:flex;align-items:center;gap:12px;padding:20px;color:var(--txt2);font-size:12px;font-weight:600;}
.ai-scanning .spinner{width:18px;height:18px;border-width:2px;flex-shrink:0}

/* ── KPI GRID ──────────────────────────────────── */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;margin-bottom:24px;
}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.kpi-grid{grid-template-columns:1fr 1fr}}

.kpi{
  background:var(--surf);
  border:1px solid var(--brd);
  border-radius:10px;padding:18px 20px;
  position:relative;overflow:hidden;
  transition:.2s;
}
.kpi:hover{border-color:var(--brd2);background:var(--surf2)}
.kpi::after{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--red),transparent);
  opacity:0;transition:.2s;
}
.kpi:hover::after{opacity:1}
.kpi-label{
  font-size:9px;font-weight:700;letter-spacing:.15em;
  text-transform:uppercase;color:var(--txt3);margin-bottom:8px;
}
.kpi-val{
  font-family:'Bebas Neue',sans-serif;
  font-size:30px;letter-spacing:.04em;color:#fff;line-height:1;
}
.kpi-val.danger{color:var(--red)}
.kpi-val.warn{color:var(--amber-lt)}
.kpi-val.good{color:var(--green-lt)}
.kpi-sub{
  font-size:10px;color:var(--txt3);margin-top:6px;
  font-weight:500;
}

/* ── CHARTS GRID ───────────────────────────────── */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr}}

.card{
  background:var(--surf);border:1px solid var(--brd);
  border-radius:10px;padding:20px 24px;
}
.card-title{
  font-size:9px;font-weight:700;letter-spacing:.15em;
  text-transform:uppercase;color:var(--txt3);
  margin-bottom:18px;display:flex;align-items:center;gap:8px;
}
.card-title::before{
  content:'';width:3px;height:10px;
  background:var(--red);border-radius:2px;flex-shrink:0;
}

/* ── BARS ──────────────────────────────────────── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-row:last-child{margin-bottom:0}
.bar-lbl{
  font-size:11px;font-weight:500;color:var(--txt2);
  width:145px;overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;flex-shrink:0;
}
.bar-track{
  flex:1;height:6px;background:var(--surf3);
  border-radius:3px;overflow:hidden;
}
.bar-fill{
  height:100%;border-radius:3px;
  background:var(--red);
  transition:width .6s cubic-bezier(.4,0,.2,1);
}
.bar-fill.gold{background:linear-gradient(90deg,var(--amber),var(--amber-lt))}
.bar-val{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:500;color:var(--txt3);
  width:68px;text-align:right;flex-shrink:0;
}

/* ── TOOLBAR ───────────────────────────────────── */
.toolbar{
  display:flex;align-items:center;gap:8px;
  margin-bottom:14px;flex-wrap:wrap;
}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:380px}
.search-ico{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  width:13px;height:13px;color:var(--txt3);pointer-events:none;
  stroke:currentColor;fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;
}
.search-input{
  width:100%;padding:8px 12px 8px 30px;
  background:var(--surf2);border:1px solid var(--brd2);
  border-radius:8px;color:var(--txt);
  font-size:12px;font-weight:500;
  font-family:'Inter',sans-serif;outline:none;transition:.15s;
}
.search-input:focus{border-color:var(--red);background:var(--surf3)}
.search-input::placeholder{color:var(--txt3)}

.sel{
  padding:8px 12px;background:var(--surf2);
  border:1px solid var(--brd2);border-radius:8px;
  color:var(--txt2);font-size:11px;font-weight:600;
  font-family:'Inter',sans-serif;outline:none;cursor:pointer;
  transition:.15s;
}
.sel:focus{border-color:var(--red)}

.badge{
  font-size:10px;font-weight:600;color:var(--txt3);
  padding:4px 10px;background:var(--surf2);
  border-radius:20px;border:1px solid var(--brd);
  white-space:nowrap;
}

.btn-outline{
  padding:7px 14px;background:transparent;
  border:1px solid var(--brd2);border-radius:8px;
  color:var(--txt3);font-size:10px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:.15s;font-family:'Inter',sans-serif;
}
.btn-outline:hover{border-color:var(--txt3);color:var(--txt)}
.btn-outline svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

/* ── TABLE ─────────────────────────────────────── */
.tbl-wrap{
  background:var(--surf);border:1px solid var(--brd);
  border-radius:10px;overflow:hidden;
}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--surf2);border-bottom:1px solid var(--brd)}
th{
  padding:10px 14px;text-align:left;
  font-size:9px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--txt3);
  white-space:nowrap;cursor:pointer;user-select:none;
  transition:.15s;
}
th:hover{color:var(--txt2)}
th.asc::after{content:' ↑';color:var(--red)}
th.desc::after{content:' ↓';color:var(--red)}
tbody tr{
  border-bottom:1px solid rgba(255,255,255,.03);
  transition:.1s;
}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.02)}
td{padding:11px 14px;vertical-align:middle}

.tc-name{
  font-weight:600;color:#fff;
  max-width:160px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
}
.tc-mono{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:500;
}
.tc-cheque{color:var(--red)}
.tc-fecha{color:var(--txt2)}
.tc-monto{text-align:right;color:var(--txt2)}
.tc-monto.highlight{color:#fff;font-weight:600}
.tc-pend{text-align:right;font-weight:700}
.tc-pend.debt{color:var(--red)}
.tc-pend.paid{color:var(--green-lt)}
.tc-mora{text-align:right}
.tc-detail{
  font-size:11px;color:var(--txt3);
  max-width:120px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
}
.tc-act{text-align:right;width:50px}

/* TAGS */
.tag{
  display:inline-flex;align-items:center;
  padding:2px 7px;border-radius:4px;
  font-size:9px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;white-space:nowrap;
}
.tag-red{background:rgba(212,0,10,.1);color:#f87171;border:1px solid rgba(212,0,10,.2)}
.tag-blue{background:rgba(59,130,246,.1);color:#93c5fd;border:1px solid rgba(59,130,246,.15)}
.tag-gold{background:rgba(217,119,6,.1);color:#fcd34d;border:1px solid rgba(217,119,6,.15)}

/* ACTION BTN */
.act-btn{
  width:28px;height:28px;border:none;background:transparent;
  color:var(--txt3);cursor:pointer;border-radius:6px;
  display:inline-flex;align-items:center;justify-content:center;
  transition:.15s;
}
.act-btn:hover{background:var(--surf3);color:#fff}
.act-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── EMPTY ─────────────────────────────────────── */
.empty{
  padding:60px 20px;text-align:center;color:var(--txt3);
}
.empty svg{width:32px;height:32px;margin:0 auto 10px;display:block;stroke:currentColor;fill:none;stroke-width:1.5;opacity:.25}
.empty p{font-size:13px;font-weight:600}
.empty span{font-size:11px;display:block;margin-top:3px;opacity:.5}

/* ── LOADING ───────────────────────────────────── */
#loading{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:340px;gap:16px;color:var(--txt3);
}
.spinner{
  width:32px;height:32px;
  border:2px solid var(--brd2);
  border-top-color:var(--red);
  border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{
  font-family:'Bebas Neue',sans-serif;
  font-size:16px;letter-spacing:.2em;color:var(--txt3);
}

/* ── MODAL ─────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.85);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.modal{
  background:var(--surf);border:1px solid var(--brd2);
  border-radius:12px;width:100%;max-width:500px;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 32px 80px rgba(0,0,0,.7);
}
.modal-hdr{
  padding:20px 24px 18px;
  border-bottom:1px solid var(--brd);
  display:flex;align-items:flex-start;justify-content:space-between;
}
.modal-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:.1em;color:#fff;line-height:1;
}
.modal-sub{
  font-size:10px;color:var(--txt3);font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;margin-top:4px;
}
.modal-x{
  width:28px;height:28px;border:none;background:transparent;
  color:var(--txt3);cursor:pointer;border-radius:6px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.modal-x:hover{background:var(--surf2);color:#fff}
.modal-x svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.modal-ftr{
  padding:16px 24px;border-top:1px solid var(--brd);
  display:flex;justify-content:flex-end;gap:8px;
}

/* FIELDS */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field label{
  display:block;font-size:9px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--txt3);margin-bottom:5px;
}
.field input,.field select{
  width:100%;padding:9px 12px;
  background:var(--surf2);border:1px solid var(--brd2);
  border-radius:7px;color:#fff;font-size:12px;font-weight:500;
  font-family:'Inter',sans-serif;outline:none;transition:.15s;
}
.field input:focus,.field select:focus{border-color:var(--red);background:var(--surf3)}
.field input::placeholder{color:var(--txt3)}
.field input[readonly]{opacity:.45;cursor:not-allowed}

.saldo-box{
  background:var(--surf2);border:1px solid var(--brd);
  border-radius:8px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.saldo-lbl{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--txt3)}
.saldo-val{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:.04em;line-height:1;
}
.saldo-val.debt{color:var(--red)}
.saldo-val.paid{color:var(--green-lt)}

.btn-cancel{
  padding:9px 18px;background:transparent;
  border:1px solid var(--brd2);border-radius:8px;
  color:var(--txt2);font-size:11px;font-weight:600;
  font-family:'Inter',sans-serif;cursor:pointer;transition:.15s;
}
.btn-cancel:hover{border-color:var(--txt3)}
.btn-save{
  padding:9px 22px;background:var(--red);border:none;
  border-radius:8px;color:#fff;font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
  display:flex;align-items:center;gap:7px;transition:.15s;
  font-family:'Inter',sans-serif;
}
.btn-save:hover{background:var(--red2)}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
.btn-save svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

/* ── TOASTS ────────────────────────────────────── */
#toasts{position:fixed;top:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:10px 16px;border-radius:8px;
  font-size:12px;font-weight:600;max-width:300px;
  display:flex;align-items:center;gap:8px;
  animation:tin .2s ease;
}
@keyframes tin{from{transform:translateX(105%);opacity:0}to{transform:none;opacity:1}}
.toast.success{background:#052e16;border:1px solid rgba(74,222,128,.2);color:#86efac}
.toast.error{background:#180000;border:1px solid rgba(212,0,10,.3);color:#f87171}
.toast.info{background:var(--surf);border:1px solid var(--brd2);color:var(--txt2)}

/* ── FOOTER ────────────────────────────────────── */
footer{
  border-top:1px solid var(--brd);
  padding:12px 28px;
  display:flex;align-items:center;justify-content:space-between;
}
.ftr-left{
  font-size:9px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--txt3);
}
.ftr-right{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;color:var(--txt3);
}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<header>
  <div class="hdr">
    <div class="brand">
      <img class="brand-logo" src="https://moretti.com.ar/wp-content/uploads/2021/08/logo-moretti-1.png" alt="Moretti" onerror="this.style.display='none';document.getElementById('brand-fallback').style.display='flex'"/>
      <div id="brand-fallback" style="display:none;align-items:center;justify-content:center;width:36px;height:36px;background:var(--red);font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;border-radius:4px">M</div>
      <div class="brand-divider"></div>
      <div class="brand-label">Tesorería <span>·</span> Cheques</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--txt3);padding:3px 8px;background:var(--surf2);border:1px solid var(--brd2);border-radius:4px;letter-spacing:.04em">v1.1.6</div>
    </div>
    <div class="hdr-right">
      <div class="sync-pill loading" id="syncPill">
        <div class="sync-dot"></div>
        <span id="syncTxt">Cargando</span>
      </div>
      <button class="icon-btn" onclick="loadAll()" title="Actualizar">
        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      </button>
      <button class="icon-btn" onclick="exportCSV()" title="Exportar CSV">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
    </div>
  </div>
</header>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <button class="tab active" id="tab-dashboard"  onclick="showTab('dashboard')">Dashboard</button>
    <button class="tab"        id="tab-rechazados" onclick="showTab('rechazados')">Rechazados</button>
    <button class="tab"        id="tab-cancelados" onclick="showTab('cancelados')">Cancelados</button>
    <button class="tab"        id="tab-importar"   onclick="showTab('importar')">Importación</button>

  </div>
</nav>

<!-- MAIN -->
<main id="main">
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-txt">Cargando datos</div>
  </div>
</main>

<footer>
  <div class="ftr-left">Moretti S.A. · Sistema de Tesorería · <span style="color:var(--red)">v1.1.6</span></div>
  <div class="ftr-right" id="ftrDate">Última modificación: 09/03/2026</div>
</footer>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalInner"></div>
</div>
<div id="toasts"></div>

<script>
const S={rechazados:[],cancelados:[],kpis:null,filtered:[],tab:'dashboard',q:'',mot:'',anio:'',cli:'',sortF:'',sortD:'desc'};
const API='https://script.google.com/macros/s/AKfycbwpf9Hvudj-Z95KcygAUO9EkrFuUwkJ8cexlxWHECcV58J9_-Q_nv4Ty2FGqpKQ19DPJg/exec';

function setSyncState(s){
  const el=document.getElementById('syncPill'),t=document.getElementById('syncTxt');
  if(!el)return;
  el.className='sync-pill '+s;
  t.textContent=s==='ok'?'Sincronizado':s==='loading'?'Cargando':'Error';
}
async function loadAll(){
  setSyncState('loading');
  try{
    const[r1,r2]=await Promise.all([
      fetch(API+'?action=getRechazados').then(r=>r.json()),
      fetch(API+'?action=getCancelados').then(r=>r.json()),
    ]);
    if(!r1.ok)throw new Error(r1.error);
    S.rechazados=r1.data; S.kpis=r1.kpis;
    if(r2.ok)S.cancelados=r2.data;
    setSyncState('ok');
    render();
    toast('✓ '+S.rechazados.length+' rechazados · '+S.cancelados.length+' cancelados','success');
  }catch(e){setSyncState('error');toast('Error: '+e.message,'error');}
}

function showTab(t){
  S.tab=t;S.q='';S.mot='';S.anio='';S.cli='';
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  render();
}
function render(){
  if(S.tab==='dashboard')renderDashboard();
  else if(S.tab==='rechazados')renderRechazados();
  else if(S.tab==='cancelados')renderCancelados();
  else if(S.tab==='importar')renderImportar();
  else if(S.tab==='config')renderConfig();
}

// ── DASHBOARD ────────────────────────────────────
function renderDashboard(){
  const k=S.kpis;if(!k)return;
  const mots=Object.entries(k.porMotivo).sort((a,b)=>b[1].importe-a[1].importe);
  const maxM=mots[0]?.[1].importe||1;
  const maxC=k.topClientes[0]?.pendiente||1;

  document.getElementById('main').innerHTML=`
  <div class="section-header">
    <div class="section-title">Panel General</div>
    <div class="section-sub">Cheques rechazados 2024 — 2026</div>
  </div>
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Total Pendiente</div><div class="kpi-val danger">${fmt(k.totalPendiente)}</div><div class="kpi-sub">${k.cantidadActivos} cheques activos</div></div>
    <div class="kpi"><div class="kpi-label">Importe Total</div><div class="kpi-val">${fmt(k.totalImporte)}</div><div class="kpi-sub">${k.cantidadTotal} cheques registrados</div></div>
    <div class="kpi"><div class="kpi-label">Gastos Bancarios</div><div class="kpi-val warn">${fmt(k.totalGastos)}</div><div class="kpi-sub">Cargos acumulados</div></div>
    <div class="kpi"><div class="kpi-label">Mora Promedio</div><div class="kpi-val ${k.moraProm>90?'danger':k.moraProm>45?'warn':'good'}">${k.moraProm>0?k.moraProm:'—'}</div><div class="kpi-sub">días promedio</div></div>
    <div class="kpi"><div class="kpi-label">Cancelados</div><div class="kpi-val good">${S.cancelados.length}</div><div class="kpi-sub">cheques recuperados</div></div>
  </div>
  <div class="charts-grid">
    <div class="card">
      <div class="card-title">Pendiente por Motivo</div>
      ${mots.map(([m,d])=>`<div class="bar-row">
        <div class="bar-lbl" title="${m}">${m||'Sin motivo'}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.importe/maxM*100)}%"></div></div>
        <div class="bar-val">${fmtK(d.importe)}</div>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Top Clientes por Deuda</div>
      ${k.topClientes.map((c,i)=>`<div class="bar-row">
        <div class="bar-lbl" title="${c.nombre}">${c.nombre}</div>
        <div class="bar-track"><div class="bar-fill ${i>0?'gold':''}" style="width:${Math.round(c.pendiente/maxC*100)}%"></div></div>
        <div class="bar-val">${fmtK(c.pendiente)}</div>
      </div>`).join('')}
    </div>
  </div>
  <div class="card">
    <div class="card-title">Mayor Mora — Top 10</div>
    ${miniTbl(S.rechazados.filter(r=>r.pendiente>0).sort((a,b)=>b.diasMora-a.diasMora).slice(0,10))}
  </div>`;
}

function miniTbl(rows){
  if(!rows.length)return'<div class="empty"><p>Sin datos</p></div>';
  return`<div class="tbl-scroll"><table>
    <thead><tr><th>Cliente</th><th>N° Cheque</th><th>Rechazo</th><th>Motivo</th><th style="text-align:right">Pendiente</th><th style="text-align:right">Mora</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td class="tc-name">${r.cliente}</td>
      <td class="tc-mono tc-cheque">${r.nroCheque}</td>
      <td class="tc-mono tc-fecha">${r.fechaRechazo}</td>
      <td><span class="tag tag-red">${r.motivo||'—'}</span></td>
      <td class="tc-pend tc-mono ${r.pendiente>0?'debt':'paid'}">${fmt(r.pendiente)}</td>
      <td class="tc-mora tc-mono" style="color:${r.diasMora>90?'var(--red)':r.diasMora>45?'var(--amber-lt)':'var(--txt2)'}">${r.diasMora||'—'}</td>
    </tr>`).join('')}</tbody></table></div>`;
}

// ── RECHAZADOS ───────────────────────────────────
function renderRechazados(){
  applyFilters();
  const mots=[...new Set(S.rechazados.map(r=>r.motivo).filter(Boolean))].sort();
  const anios=[...new Set(S.rechazados.map(r=>r.anio).filter(Boolean))].sort().reverse();
  const clis=[...new Set(S.rechazados.map(r=>r.cliente).filter(Boolean))].sort();

  document.getElementById('main').innerHTML=`
  <div class="section-header">
    <div class="section-title">Rechazados</div>
    <div class="section-sub">${S.rechazados.length} registros totales</div>
    <button class="btn-new" onclick="openNuevoCheque('rechazados')"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nuevo Cheque</button>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <svg class="search-ico" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="sInput" placeholder="Buscar cliente, cheque, motivo..." value="${S.q}" oninput="onSearch(this.value)"/>
    </div>
    <select class="sel" onchange="onFiltro('mot',this.value)">
      <option value="">Todos los motivos</option>
      ${mots.map(m=>`<option value="${m}" ${S.mot===m?'selected':''}>${m}</option>`).join('')}
    </select>
    <select class="sel" onchange="onFiltro('anio',this.value)">
      <option value="">Todos los años</option>
      ${anios.map(a=>`<option value="${a}" ${S.anio===a?'selected':''}>${a}</option>`).join('')}
    </select>
    <select class="sel" style="max-width:175px" onchange="onFiltro('cli',this.value)">
      <option value="">Todos los clientes</option>
      ${clis.map(c=>`<option value="${c}" ${S.cli===c?'selected':''}>${c}</option>`).join('')}
    </select>
    <span class="badge" id="cBadge">${S.filtered.length} / ${S.rechazados.length}</span>
    <button class="btn-outline" onclick="exportCSV()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar
    </button>
  </div>
  <div class="tbl-wrap" id="tWrap">${renderTabla(S.filtered)}</div>`;
}

function renderTabla(rows){
  if(!rows.length)return`<div class="empty"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>Sin resultados</p><span>Probá con otro filtro</span></div>`;
  const sc=f=>S.sortF===f?S.sortD:'';
  return`<div class="tbl-scroll"><table>
    <thead><tr>
      <th onclick="sortBy('cliente')" class="${sc('cliente')}">Cliente</th>
      <th onclick="sortBy('nroCheque')" class="${sc('nroCheque')}">N° Cheque</th>
      <th>Tipo</th>
      <th onclick="sortBy('fechaRechazo')" class="${sc('fechaRechazo')}">Rechazo</th>
      <th>Vencimiento</th>
      <th>Motivo</th>
      <th onclick="sortBy('importe')" class="${sc('importe')}" style="text-align:right">Importe</th>
      <th style="text-align:right">Gastos</th>
      <th onclick="sortBy('pendiente')" class="${sc('pendiente')}" style="text-align:right">Pendiente</th>
      <th onclick="sortBy('diasMora')" class="${sc('diasMora')}" style="text-align:right">Mora</th>
      <th>Detalle</th>
      <th></th>
    </tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td class="tc-name" title="${r.cliente}">${r.cliente}</td>
      <td class="tc-mono tc-cheque">${r.nroCheque}</td>
      <td><span class="tag ${r.tipo==='Electronico'?'tag-blue':'tag-gold'}">${r.tipo}</span></td>
      <td class="tc-mono tc-fecha">${r.fechaRechazo}</td>
      <td class="tc-mono tc-fecha">${r.vencimiento}</td>
      <td><span class="tag tag-red">${r.motivo||'—'}</span></td>
      <td class="tc-monto tc-mono">${fmt(r.importe)}</td>
      <td class="tc-monto tc-mono" style="color:var(--amber-lt)">${r.gastos?fmt(r.gastos):'—'}</td>
      <td class="tc-pend tc-mono ${r.pendiente>0?'debt':'paid'}">${fmt(r.pendiente)}</td>
      <td class="tc-mora tc-mono" style="color:${r.diasMora>90?'var(--red)':r.diasMora>45?'var(--amber-lt)':'var(--txt2)'}">${r.diasMora||'—'}</td>
      <td class="tc-detail" title="${r.detalle}">${r.detalle||'—'}</td>
      <td class="tc-act"><button class="act-btn" onclick='openModal(${JSON.stringify(r).replace(/\\/g,"\\\\").replace(/'/g,"\\'")})'><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button></td>
    </tr>`).join('')}</tbody></table></div>`;
}

// ── CANCELADOS ───────────────────────────────────
function renderCancelados(){
  document.getElementById('main').innerHTML=`
  <div class="section-header">
    <div class="section-title">Cancelados</div>
    <div class="section-sub">${S.cancelados.length} cheques recuperados</div>
    <button class="btn-new" onclick="openNuevoCheque('cancelados')"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nuevo Cheque</button>
  </div>
  <div class="tbl-wrap">
    ${!S.cancelados.length?'<div class="empty"><p>Sin datos</p></div>':`
    <div class="tbl-scroll"><table>
      <thead><tr><th>Cliente</th><th>N° Cheque</th><th>Tipo</th><th>Rechazo</th><th>Motivo</th><th style="text-align:right">Importe</th><th>Cancelación</th><th style="text-align:right">Importe Canc.</th></tr></thead>
      <tbody>${S.cancelados.map(r=>`<tr>
        <td class="tc-name">${r.cliente}</td>
        <td class="tc-mono tc-cheque">${r.nroCheque}</td>
        <td><span class="tag ${r.tipo==='Electronico'?'tag-blue':'tag-gold'}">${r.tipo}</span></td>
        <td class="tc-mono tc-fecha">${r.fechaRechazo}</td>
        <td><span class="tag tag-red">${r.motivo||'—'}</span></td>
        <td class="tc-monto tc-mono">${fmt(r.importe)}</td>
        <td class="tc-mono tc-fecha">${r.cancelacion||'—'}</td>
        <td class="tc-monto tc-mono" style="color:var(--green-lt)">${r.importeCancelacion?fmt(r.importeCancelacion):'—'}</td>
      </tr>`).join('')}</tbody></table></div>`}
  </div>`;
}

// ── FILTROS ──────────────────────────────────────
function applyFilters(){
  let rows=S.rechazados;
  if(S.q){const q=S.q.toLowerCase();rows=rows.filter(r=>[r.cliente,r.nroCheque,r.motivo,r.detalle].some(f=>f?.toLowerCase().includes(q)));}
  if(S.mot)rows=rows.filter(r=>r.motivo===S.mot);
  if(S.anio)rows=rows.filter(r=>r.anio===S.anio);
  if(S.cli)rows=rows.filter(r=>r.cliente===S.cli);
  if(S.sortF){rows=[...rows].sort((a,b)=>{const va=a[S.sortF],vb=b[S.sortF];const c=typeof va==='number'?va-vb:String(va||'').localeCompare(String(vb||''));return S.sortD==='asc'?c:-c;});}
  S.filtered=rows;
}
function refreshTbl(){applyFilters();const w=document.getElementById('tWrap');if(w){w.innerHTML=renderTabla(S.filtered);document.getElementById('cBadge').textContent=S.filtered.length+' / '+S.rechazados.length;}}
function onSearch(v){S.q=v;refreshTbl();}
function onFiltro(k,v){S[k]=v;refreshTbl();}
function sortBy(f){S.sortD=S.sortF===f&&S.sortD==='desc'?'asc':'desc';S.sortF=f;refreshTbl();}

// ── MODAL ────────────────────────────────────────
function openModal(row){
  const saldo=row.importe+row.gastos-(row.importeCancelacion||0);
  const opts=v=>['Deposito Galicia','Deposito Nacion','Deposito Santander','Pago a proveedores','Negociado Galicia','Efectivo','Transferencia','En gestión'].map(o=>`<option value="${o}" ${v===o?'selected':''}>${o}</option>`).join('');
  document.getElementById('modalInner').innerHTML=`
    <div class="modal-hdr">
      <div><div class="modal-title">Actualizar Registro</div><div class="modal-sub">Cheque N° ${row.nroCheque} · ${row.cliente}</div></div>
      <button class="modal-x" onclick="closeModal()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="frow">
        <div class="field"><label>Importe Original</label><input value="${fmt(row.importe)}" readonly/></div>
        <div class="field"><label>Gastos Bancarios</label><input value="${fmt(row.gastos)}" readonly/></div>
      </div>
      <div class="frow">
        <div class="field"><label>Tipo Cancelación</label><select id="fTipo"><option value="">— Sin cancelación —</option>${opts(row.tipoCancelacion)}</select></div>
        <div class="field"><label>Importe Cancelación</label><input type="number" id="fImporte" step="0.01" value="${row.importeCancelacion||''}" placeholder="0.00" oninput="updSaldo(${row.importe},${row.gastos})"/></div>
      </div>
      <div class="frow">
        <div class="field"><label>Fecha Cancelación</label><input type="date" id="fFechaCan" value="${toDate(row.cancelacion)}"/></div>
        <div class="field"><label>Fecha Aviso</label><input type="date" id="fAviso" value="${toDate(row.aviso)}"/></div>
      </div>
      <div class="field"><label>Detalle / Acción</label><select id="fDetalle"><option value="">— Sin detalle —</option>${opts(row.detalle)}</select></div>
      <div class="frow">
        <div class="field"><label>Envío</label><input type="text" id="fEnvio" value="${row.envio||''}" placeholder="Enviado a..."/></div>
        <div class="field"><label>CAC / DEV</label><input type="text" id="fCac" value="${row.cacDev||''}"/></div>
      </div>
      <div class="saldo-box">
        <div class="saldo-lbl">Saldo Pendiente</div>
        <div class="saldo-val ${saldo>0?'debt':'paid'}" id="saldoVal">${fmt(saldo)}</div>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btnSave" onclick="saveRow(${row.fila},${row.importe},${row.gastos})">
        <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Guardar
      </button>
    </div>`;
  document.getElementById('overlay').style.display='flex';
}

function updSaldo(imp,gas){
  const canc=parseFloat(document.getElementById('fImporte').value)||0;
  const s=imp+gas-canc;
  const el=document.getElementById('saldoVal');
  if(el){el.textContent=fmt(s);el.className='saldo-val '+(s>0?'debt':'paid');}
}

async function saveRow(fila,imp,gas){
  const btn=document.getElementById('btnSave');
  btn.disabled=true;btn.textContent='Guardando...';
  const canc=parseFloat(document.getElementById('fImporte').value)||0;
  const campos={
    tipoCancelacion:document.getElementById('fTipo').value,
    importeCancelacion:canc,
    cancelacion:fromDate(document.getElementById('fFechaCan').value),
    aviso:fromDate(document.getElementById('fAviso').value),
    detalle:document.getElementById('fDetalle').value,
    envio:document.getElementById('fEnvio').value,
    cacDev:document.getElementById('fCac').value,
    pendiente:imp+gas-canc,
  };
  try{
    const res=await fetch(API,{method:'POST',body:JSON.stringify({action:'actualizarFila',fila,campos})});
    const r=await res.json();
    if(!r.ok){toast('Error: '+r.error,'error');btn.disabled=false;btn.textContent='Guardar';return;}
    const idx=S.rechazados.findIndex(r=>r.fila===fila);
    if(idx>=0)Object.assign(S.rechazados[idx],campos);
    S.kpis=recalcKPIs(S.rechazados);
    closeModal();toast('✓ Guardado','success');render();
  }catch(e){toast('Error: '+e.message,'error');btn.disabled=false;btn.textContent='Guardar';}
}
function closeModal(){document.getElementById('overlay').style.display='none';}

// ── KPIs LOCAL ────────────────────────────────────
function recalcKPIs(rows){
  const act=rows.filter(r=>r.pendiente>0);
  const pend=act.reduce((s,r)=>s+r.pendiente,0);
  const imp=rows.reduce((s,r)=>s+r.importe,0);
  const gas=rows.reduce((s,r)=>s+r.gastos,0);
  const mora=act.length?act.reduce((s,r)=>s+(r.diasMora||0),0)/act.length:0;
  const porMotivo={};rows.forEach(r=>{if(!porMotivo[r.motivo])porMotivo[r.motivo]={cantidad:0,importe:0};porMotivo[r.motivo].cantidad++;porMotivo[r.motivo].importe+=r.pendiente;});
  const porCliente={};rows.forEach(r=>{if(!r.cliente)return;if(!porCliente[r.cliente])porCliente[r.cliente]={cantidad:0,pendiente:0};porCliente[r.cliente].cantidad++;porCliente[r.cliente].pendiente+=r.pendiente;});
  const topClientes=Object.entries(porCliente).map(([nombre,d])=>({nombre,...d})).sort((a,b)=>b.pendiente-a.pendiente).slice(0,8);
  return{totalPendiente:pend,totalImporte:imp,totalGastos:gas,cantidadActivos:act.length,cantidadTotal:rows.length,moraProm:Math.round(mora),porMotivo,topClientes};
}

// ── CSV ───────────────────────────────────────────
function exportCSV(){
  const rows=S.tab==='cancelados'?S.cancelados:S.filtered;
  if(!rows.length){toast('Sin datos','info');return;}
  const h=['Cliente','N° Cheque','Tipo','Fecha Rechazo','Vencimiento','Motivo','Importe','Gastos','Pendiente','Días Mora','Detalle'];
  const csv=[h.join(','),...rows.map(r=>['"'+r.cliente+'"',r.nroCheque,r.tipo,r.fechaRechazo,r.vencimiento,r.motivo,r.importe,r.gastos,r.pendiente,r.diasMora,'"'+(r.detalle||'')+'"'].join(','))].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='cheques_moretti_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();toast('CSV exportado','success');
}

// ── IMPORTACIÓN ──────────────────────────────────
function renderImportar(){
  document.getElementById('main').innerHTML=`

      <div id="dropZone" style="border:2px dashed var(--brd2);border-radius:8px;padding:40px;text-align:center;cursor:pointer;transition:.2s;position:relative"
        ondragover="event.preventDefault();this.style.borderColor='var(--red)'"

        ondrop="handleDrop(event)"

        <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this.files[0])"/>
        <svg style="width:36px;height:36px;stroke:var(--txt3);fill:none;stroke-width:1.5;margin:0 auto 12px;display:block" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>

function handleDrop(e){
  e.preventDefault();
  document.getElementById('dropZone').style.borderColor='var(--brd2)';
  const f=e.dataTransfer.files[0];
  if(f)handleFile(f);
}

async function handleFile(file){
  if(!file){return;}
  const ext=file.name.split('.').pop().toLowerCase();
  if(!['xlsx','xls'].includes(ext)){toast('Solo se aceptan archivos .xlsx o .xls','error');return;}

  const prev=document.getElementById('importPreview');
  prev.innerHTML=`<div class="card"><div style="display:flex;align-items:center;gap:10px;color:var(--txt2)"><div class="spinner" style="width:20px;height:20px;border-width:2px"></div><span style="font-size:12px;font-weight:600">Leyendo archivo...</span></div></div>`;

  try{
    const data=await file.arrayBuffer();
    // Usar SheetJS
    const XLSX=await loadSheetJS();
    const wb=XLSX.read(data,{type:'array',cellDates:true});

    // Buscar solapa RECHAZADOS
    const sheetName=wb.SheetNames.find(n=>n.toUpperCase().includes('RECHAZADO'));
    if(!sheetName){
      prev.innerHTML=renderImportError('No se encontró una solapa llamada "RECHAZADOS" en el archivo.');
      return;
    }
    const ws=wb.Sheets[sheetName];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:'dd/mm/yyyy'});

    // Headers en fila 3 (índice 2)
    const headers=rows[2];
    const required=['Cliente','Emisión','Vencimiento','TIPO','n ch','Fecha de Rechazo','MES','AÑO','MOTIVO','Importe'];
    const missing=required.filter(r=>!headers.some(h=>String(h||'').toLowerCase().includes(r.toLowerCase())));

    if(missing.length>0){
      prev.innerHTML=renderImportError('Columnas faltantes: '+missing.join(', '));
      return;
    }

    // Datos desde fila 4 (índice 3)
    const dataRows=rows.slice(3).filter(r=>r[0]||r[5]);
    const errors=[];
    const valid=[];

    dataRows.forEach((r,i)=>{
      const fila=i+4;
      const rowErrors=[];
      if(!r[0])rowErrors.push('Cliente vacío');
      if(!r[5])rowErrors.push('N° Cheque vacío');
      if(!r[9])rowErrors.push('Motivo vacío');
      const imp=parseFloat(String(r[10]||'').replace(/[^0-9.-]/g,''));
      if(isNaN(imp)||imp<=0)rowErrors.push('Importe inválido');

      if(rowErrors.length>0)errors.push({fila,cliente:r[0]||'—',cheque:r[5]||'—',errores:rowErrors});
      else valid.push(r);
    });

    // Mostrar resultado
    prev.innerHTML=`
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Resultado de Validación</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:${errors.length>0?'20px':'0'}">
        <div style="text-align:center;padding:16px;background:var(--surf2);border-radius:8px">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--green-lt)">${valid.length}</div>
          <div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);margin-top:4px">Registros válidos</div>
        </div>
        <div style="text-align:center;padding:16px;background:var(--surf2);border-radius:8px">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:${errors.length>0?'var(--red)':'var(--green-lt)'}">${errors.length}</div>
          <div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);margin-top:4px">Con errores</div>
        </div>
        <div style="text-align:center;padding:16px;background:var(--surf2);border-radius:8px">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:#fff">${dataRows.length}</div>
          <div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);margin-top:4px">Total en archivo</div>
        </div>
      </div>
      ${errors.length>0?`
      <div style="border-top:1px solid var(--brd);padding-top:16px;margin-top:4px">
        <div style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--red);margin-bottom:10px">⚠ Filas con errores (no se importarán)</div>
        <div style="max-height:180px;overflow-y:auto">
        ${errors.map(e=>`
          <div style="display:flex;align-items:center;gap:10px;padding:7px 10px;background:rgba(212,0,10,.06);border-radius:6px;margin-bottom:4px;font-size:11px">
            <span style="font-family:'JetBrains Mono',monospace;color:var(--txt3);font-size:10px">F${e.fila}</span>
            <span style="font-weight:600;color:var(--txt2);flex:1">${e.cliente}</span>
            <span style="color:var(--txt3)">${e.errores.join(' · ')}</span>
          </div>`).join('')}
        </div>
      </div>`:''}
    </div>

    ${valid.length>0?`
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Vista Previa — Primeros 5 registros</div>
      <div class="tbl-scroll"><table>
        <thead><tr><th>Cliente</th><th>N° Cheque</th><th>Tipo</th><th>Rechazo</th><th>Motivo</th><th style="text-align:right">Importe</th></tr></thead>
        <tbody>${valid.slice(0,5).map(r=>`<tr>
          <td class="tc-name">${r[0]||'—'}</td>
          <td class="tc-mono tc-cheque">${r[5]||'—'}</td>
          <td><span class="tag tag-blue">${r[3]||'—'}</span></td>
          <td class="tc-mono tc-fecha">${r[6]||'—'}</td>
          <td><span class="tag tag-red">${r[9]||'—'}</span></td>
          <td class="tc-monto tc-mono">$${parseFloat(String(r[10]||0).replace(/[^0-9.-]/g,'')).toLocaleString('es-AR',{minimumFractionDigits:2})}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px">
      <button class="btn-cancel" onclick="renderImportar()">Cancelar</button>
      <button class="btn-save" onclick="confirmarImport(${JSON.stringify(valid).replace(/"/g,'&quot;')})">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Importar ${valid.length} registros a Google Sheets
      </button>
    </div>`:''}`;

  }catch(e){
    prev.innerHTML=renderImportError('Error leyendo el archivo: '+e.message);
  }
}

function renderImportError(msg){
  return`<div class="card"><div style="display:flex;align-items:center;gap:10px;color:#f87171;padding:8px 0">
    <svg style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span style="font-size:12px;font-weight:600">${msg}</span>
  </div></div>`;
}

async function loadSheetJS(){
  if(window.XLSX)return window.XLSX;
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>res(window.XLSX);
    s.onerror=rej;
    document.head.appendChild(s);
  });
}

async function confirmarImport(rows){
  const btn=event.target.closest('button');
  btn.disabled=true;btn.textContent='Importando...';
  try{
    const res=await fetch(API,{
      method:'POST',
      body:JSON.stringify({action:'importarRechazados',rows}),
    });
    const r=await res.json();
    if(!r.ok)throw new Error(r.error);
    toast('✓ '+rows.length+' registros importados correctamente','success');
    await loadAll();
    showTab('rechazados');
  }catch(e){
    toast('Error al importar: '+e.message,'error');
    btn.disabled=false;btn.textContent='Importar '+rows.length+' registros';
  }
}

async function guardarConfig(){
  const cfg={
    mailTo:    document.getElementById('cfgMailTo').value,
    mailCC:    document.getElementById('cfgMailCC').value,
    mailSubject:document.getElementById('cfgMailSubject').value,
    onNew:     document.getElementById('cfgOnNew').checked,
    onImport:  document.getElementById('cfgOnImport').checked,
    geminiKey: document.getElementById('cfgGeminiKey')?.value||'',
  };
  // Save API key to localStorage for IA scanning
  if(cfg.geminiKey) localStorage.setItem('gemini_key', cfg.geminiKey);
  try{
    const res=await fetch(API,{method:'POST',body:JSON.stringify({action:'guardarConfig',config:cfg})});
    const r=await res.json();
    if(!r.ok)throw new Error(r.error);
    S.config=cfg;
    toast('✓ Configuración guardada','success');
  }catch(e){
    toast('Error: '+e.message,'error');
  }
}
function fmt(n){if(!n&&n!==0)return'—';return'$'+Number(n).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtK(n){if(!n)return'—';if(n>=1000000)return'$'+(n/1000000).toFixed(1)+'M';if(n>=1000)return'$'+(n/1000).toFixed(0)+'k';return'$'+n.toFixed(0);}
function toDate(d){if(!d)return'';const p=d.split('/');return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:'';}
function fromDate(d){if(!d)return'';const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:'';}
function toast(msg,type='info'){
  const c=document.getElementById('toasts'),t=document.createElement('div');
  t.className='toast '+type;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}

async function ncAiHandleFile(file){
  if(!file) return;
  const status=document.getElementById('ncAiStatus');
  if(!status) return;

  const isPDF=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');

  // Check Gemini API key
  const apiKey=S.config?.geminiKey||localStorage.getItem('gemini_key')||'';
  if(!apiKey){
    status.innerHTML=`<div style="margin-top:14px;padding:14px;background:rgba(212,0,10,.08);border:1px solid rgba(212,0,10,.2);border-radius:8px;font-size:12px;color:#f87171">
      &#9888; Falta la API Key de Gemini.<br/>
      <span style="color:var(--txt2)">And&#225; a <strong>Configuraci&#243;n</strong> y carg&#225;la. Es gratis en <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--red)">aistudio.google.com</a></span>
    </div>`;
    return;
  }

  status.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-top:16px;padding:16px;background:var(--surf2);border-radius:8px">
      <div class="spinner" style="width:20px;height:20px;border-width:2px;flex-shrink:0"></div>
      <span style="font-size:12px;color:var(--txt2)">La IA est&#225; leyendo el comprobante...</span>
    </div>`;

  try{
    const base64=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(',')[1]);
      r.onerror=rej;
      r.readAsDataURL(file);
    });

    const mimeType=isPDF?'application/pdf':(file.type||'image/jpeg');
    const prompt=`Sos un asistente de tesoreria argentina. Analiza este comprobante bancario de cheque rechazado.
Devuelve UNICAMENTE un objeto JSON valido, sin markdown, sin texto adicional:
{"cliente":"nombre completo del emisor","nroCheque":"numero","tipo":"Electronico","emision":"dd/mm/yyyy","vencimiento":"dd/mm/yyyy","fechaRechazo":"dd/mm/yyyy","motivo":"SIN FONDOS","importe":391523}
Motivos validos: SIN FONDOS, CTA CERRADA, CUENTA EMBARGADA, MAL CONFECCIONADO, CUENTA CONCURSADA, VENCIDO, MAL ENDOSADO, CUENTA INEXISTENTE.
Si el motivo dice FALTA DE FONDOS usa SIN FONDOS. Importe como numero sin simbolos.`;

    const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[
          {inline_data:{mime_type:mimeType,data:base64}},
          {text:prompt}
        ]}]
      })
    });

    const data=await resp.json();
    if(data.error) throw new Error(data.error.message);

    const txt=(data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('').trim();
    const match=txt.match(/\{[\s\S]*\}/);
    if(!match) throw new Error('No se encontro JSON en la respuesta');
    const parsed=JSON.parse(match[0]);

    status.innerHTML=`
      <div style="display:flex;align-items:center;gap:8px;margin-top:14px;padding:10px 14px;background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.15);border-radius:8px;font-size:12px;color:#86efac">
        <svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;flex-shrink:0" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Datos le&#237;dos por IA &#8212; revis&#225; y guard&#225;
      </div>`;
    renderNcManual(parsed, true);

  }catch(e){
    status.innerHTML=`
      <div style="margin-top:14px;padding:12px 14px;background:rgba(212,0,10,.06);border:1px solid rgba(212,0,10,.2);border-radius:8px;font-size:12px;color:#f87171">
        &#9888; ${e.message}<br/>
        <span style="color:var(--txt3)">Pod&#233;s cargarlo manualmente.</span>
      </div>`;
  }
}

// ── QR & MOBILE URL ─────────────────────────────
const MOBILE_URL='https://marcevsanti-ux.github.io/Tesorer-a-Moretti/mobile.html';

function copyMobileURL(){
  navigator.clipboard.writeText(MOBILE_URL).then(()=>{
    const btn=document.getElementById('copyBtn');
    if(btn){btn.innerHTML='&#10003; Copiado!';}
    setTimeout(()=>{if(btn)btn.innerHTML='Copiar';},2000);
    toast('URL copiada','success');
  }).catch(()=>{});
}

function renderQR(){
  const wrap=document.getElementById('qrCode');
  if(!wrap)return;
  if(typeof QRCode==='undefined'){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload=()=>_drawQR(wrap);
    s.onerror=()=>{wrap.innerHTML='<div style="font-size:10px;color:var(--txt3);padding:12px;text-align:center">Copiá la URL</div>';};
    document.head.appendChild(s);
  }else{_drawQR(wrap);}
}
function _drawQR(wrap){
  try{
    wrap.innerHTML='<div id="qrCanvas"></div>';
    new QRCode(document.getElementById('qrCanvas'),{text:MOBILE_URL,width:100,height:100,colorDark:'#FFFFFF',colorLight:'#1C1C1C',correctLevel:QRCode.CorrectLevel.M});
    setTimeout(()=>{const img=wrap.querySelector('img,canvas');if(img){img.style.cssText='border-radius:6px;width:100px;height:100px;';}},150);
  }catch(e){wrap.innerHTML='<div style="font-size:10px;color:var(--txt3);padding:12px;text-align:center">Copiá la URL</div>';}
}
