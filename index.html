::-webkit-scrollbar-thumb:hover{background:var(--red2)}
header{position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.96);border-bottom:1px solid var(--brd);backdrop-filter:blur(12px);}
.hdr{max-width:1600px;margin:0 auto;padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:14px}
.brand-logo{height:30px;}
.brand-logo img{height:30px;width:auto;display:block;filter:brightness(0) invert(1)}
.brand-divider{width:1px;height:24px;background:var(--brd2)}
.brand-label{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.12em;color:var(--txt2);line-height:1;}
.brand-label span{color:var(--red)}
.hdr-right{display:flex;align-items:center;gap:6px}
.sync-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:var(--surf2);border:1px solid var(--brd);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);transition:.2s;}
.sync-pill.ok{color:var(--green-lt);border-color:rgba(74,222,128,.15);background:rgba(22,163,74,.06)}
.sync-pill.loading{color:var(--amber-lt);border-color:rgba(252,211,77,.1);background:rgba(217,119,6,.05)}
.sync-pill.error{color:#f87171;border-color:rgba(212,0,10,.2);background:rgba(212,0,10,.06)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.sync-pill.loading .sync-dot{animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.icon-btn{width:34px;height:34px;border:none;background:transparent;color:var(--txt3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;}
.icon-btn:hover{background:var(--surf2);color:var(--txt)}
.icon-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.user-badge{display:flex;align-items:center;gap:8px;padding:4px 10px;background:var(--surf2);border:1px solid var(--brd2);border-radius:20px;font-size:11px;font-weight:600;color:var(--txt2);}
.user-badge .rol{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:rgba(212,0,10,.1);color:var(--red);}
.user-badge .rol.operador{background:rgba(217,119,6,.1);color:var(--amber-lt);}
.user-badge .rol.consulta{background:rgba(74,222,128,.08);color:var(--green-lt);}
.nav{background:var(--dark);border-bottom:1px solid var(--brd);}
.nav-inner{max-width:1600px;margin:0 auto;padding:0 28px;display:flex;gap:0;}
.tab{padding:12px 20px;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);border:none;background:transparent;cursor:pointer;position:relative;transition:.2s;border-bottom:2px solid transparent;}
.tab::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--red);transform:scaleX(0);transition:.2s ease;}
.tab:hover{color:var(--txt2)}
.tab.active{color:#fff}
.tab.active::after{transform:scaleX(1)}
#app{display:flex;flex-direction:column;min-height:100vh}
main{flex:1;max-width:1600px;width:100%;margin:0 auto;padding:28px}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.1em;color:#fff;}
.section-sub{font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase}
.btn-new{display:flex;align-items:center;gap:7px;padding:8px 16px;background:var(--red);border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s;margin-left:auto;}
.btn-new:hover{background:var(--red2)}
.btn-new svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.nc-tabs{display:flex;gap:0;border-bottom:1px solid var(--brd);margin-bottom:20px}
.nc-tab{padding:9px 16px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;font-family:'Inter',sans-serif;}
.nc-tab.active{color:#fff;border-bottom-color:var(--red)}
.ai-drop{border:2px dashed var(--brd2);border-radius:10px;padding:32px;text-align:center;cursor:pointer;transition:.2s;position:relative;}
.ai-drop:hover,.ai-drop.drag{border-color:var(--red);background:rgba(212,0,10,.04)}
.ai-drop input[type=file]{display:none}
.ai-drop svg{width:32px;height:32px;stroke:var(--txt3);fill:none;stroke-width:1.5;margin:0 auto 10px;display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px;}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.kpi-grid{grid-template-columns:1fr 1fr}}
.kpi{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:18px 20px;position:relative;overflow:hidden;transition:.2s;}
.kpi:hover{border-color:var(--brd2);background:var(--surf2)}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),transparent);opacity:0;transition:.2s;}
.kpi:hover::after{opacity:1}
.kpi-label{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px;}
.kpi-val{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.04em;color:#fff;line-height:1;}
.kpi-val.danger{color:var(--red)}
.kpi-val.warn{color:var(--amber-lt)}
.kpi-val.good{color:var(--green-lt)}
.kpi-sub{font-size:10px;color:var(--txt3);margin-top:6px;font-weight:500;}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr}}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:20px 24px;}
.card-title{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--txt3);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.card-title::before{content:'';width:3px;height:10px;background:var(--red);border-radius:2px;flex-shrink:0;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-row:last-child{margin-bottom:0}
.bar-lbl{font-size:11px;font-weight:500;color:var(--txt2);width:145px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
.bar-track{flex:1;height:6px;background:var(--surf3);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;background:var(--red);transition:width .6s cubic-bezier(.4,0,.2,1);}
.bar-fill.gold{background:linear-gradient(90deg,var(--amber),var(--amber-lt))}
.bar-val{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;color:var(--txt3);width:68px;text-align:right;flex-shrink:0;}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:380px}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--txt3);pointer-events:none;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.search-input{width:100%;padding:8px 12px 8px 30px;background:var(--surf2);border:1px solid var(--brd2);border-radius:8px;color:var(--txt);font-size:12px;font-weight:500;font-family:'Inter',sans-serif;outline:none;transition:.15s;}
.search-input:focus{border-color:var(--red);background:var(--surf3)}
.search-input::placeholder{color:var(--txt3)}
.sel{padding:8px 12px;background:var(--surf2);border:1px solid var(--brd2);border-radius:8px;color:var(--txt2);font-size:11px;font-weight:600;font-family:'Inter',sans-serif;outline:none;cursor:pointer;transition:.15s;}
.sel:focus{border-color:var(--red)}
.badge{font-size:10px;font-weight:600;color:var(--txt3);padding:4px 10px;background:var(--surf2);border-radius:20px;border:1px solid var(--brd);white-space:nowrap;}
.btn-outline{padding:7px 14px;background:transparent;border:1px solid var(--brd2);border-radius:8px;color:var(--txt3);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s;font-family:'Inter',sans-serif;}
.btn-outline:hover{border-color:var(--txt3);color:var(--txt)}
.btn-outline svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.tbl-wrap{background:var(--surf);border:1px solid var(--brd);border-radius:10px;overflow:hidden;}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--surf2);border-bottom:1px solid var(--brd)}
th{padding:10px 14px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3);white-space:nowrap;cursor:pointer;user-select:none;transition:.15s;}
th:hover{color:var(--txt2)}
th.asc::after{content:' ↑';color:var(--red)}
th.desc::after{content:' ↓';color:var(--red)}
tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:.1s;}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.02)}
td{padding:11px 14px;vertical-align:middle}
.tc-name{font-weight:600;color:#fff;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tc-mono{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;}
.tc-cheque{color:var(--red)}
.tc-fecha{color:var(--txt2)}
.tc-monto{text-align:right;color:var(--txt2)}
.tc-monto.highlight{color:#fff;font-weight:600}
.tc-pend{text-align:right;font-weight:700}
.tc-pend.debt{color:var(--red)}
.tc-pend.paid{color:var(--green-lt)}
.tc-mora{text-align:right}
.tc-detail{font-size:11px;color:var(--txt3);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tc-act{text-align:right;width:72px}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;}
.tag-red{background:rgba(212,0,10,.1);color:#f87171;border:1px solid rgba(212,0,10,.2)}
.tag-blue{background:rgba(59,130,246,.1);color:#93c5fd;border:1px solid rgba(59,130,246,.15)}
.tag-gold{background:rgba(217,119,6,.1);color:#fcd34d;border:1px solid rgba(217,119,6,.15)}
.act-btn{width:28px;height:28px;border:none;background:transparent;color:var(--txt3);cursor:pointer;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;transition:.15s;}
.act-btn:hover{background:var(--surf3);color:#fff}
.act-btn.del:hover{background:rgba(212,0,10,.15);color:#f87171}
.act-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.empty{padding:60px 20px;text-align:center;color:var(--txt3);}
.empty svg{width:32px;height:32px;margin:0 auto 10px;display:block;stroke:currentColor;fill:none;stroke-width:1.5;opacity:.25}
.empty p{font-size:13px;font-weight:600}
.empty span{font-size:11px;display:block;margin-top:3px;opacity:.5}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:340px;gap:16px;color:var(--txt3);}
.spinner{width:32px;height:32px;border:2px solid var(--brd2);border-top-color:var(--red);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.2em;color:var(--txt3);}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--surf);border:1px solid var(--brd2);border-radius:12px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.7);}
.modal-hdr{padding:20px 24px 18px;border-bottom:1px solid var(--brd);display:flex;align-items:flex-start;justify-content:space-between;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.1em;color:#fff;line-height:1;}
.modal-sub{font-size:10px;color:var(--txt3);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-top:4px;}
.modal-x{width:28px;height:28px;border:none;background:transparent;color:var(--txt3);cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modal-x:hover{background:var(--surf2);color:#fff}
.modal-x svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.modal-ftr{padding:16px 24px;border-top:1px solid var(--brd);display:flex;justify-content:flex-end;gap:8px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field label{display:block;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3);margin-bottom:5px;}
.field input,.field select{width:100%;padding:9px 12px;background:var(--surf2);border:1px solid var(--brd2);border-radius:7px;color:#fff;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;outline:none;transition:.15s;}
.field input:focus,.field select:focus{border-color:var(--red);background:var(--surf3)}
.field input::placeholder{color:var(--txt3)}
.field input[readonly]{opacity:.45;cursor:not-allowed}
.saldo-box{background:var(--surf2);border:1px solid var(--brd);border-radius:8px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.saldo-lbl{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--txt3)}
.saldo-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.04em;line-height:1;}
.saldo-val.debt{color:var(--red)}
.saldo-val.paid{color:var(--green-lt)}
.btn-cancel{padding:9px 18px;background:transparent;border:1px solid var(--brd2);border-radius:8px;color:var(--txt2);font-size:11px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:.15s;}
.btn-cancel:hover{border-color:var(--txt3)}
.btn-save{padding:9px 22px;background:var(--red);border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:7px;transition:.15s;font-family:'Inter',sans-serif;}
.btn-save:hover{background:var(--red2)}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
.btn-save svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
#toasts{position:fixed;top:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:8px;font-size:12px;font-weight:600;max-width:300px;display:flex;align-items:center;gap:8px;animation:tin .2s ease;}
@keyframes tin{from{transform:translateX(105%);opacity:0}to{transform:none;opacity:1}}
.toast.success{background:#052e16;border:1px solid rgba(74,222,128,.2);color:#86efac}
.toast.error{background:#180000;border:1px solid rgba(212,0,10,.3);color:#f87171}
.toast.info{background:var(--surf);border:1px solid var(--brd2);color:var(--txt2)}
footer{border-top:1px solid var(--brd);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;}
.ftr-left{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);}
.ftr-right{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--txt3);}
</style>
</head>

async function initAuth(){

}

async function doLogout(){

// ── SYNC STATE ────────────────────────────────────────────────
function setSyncState(s){
  const el=document.getElementById('syncPill'),t=document.getElementById('syncTxt');
  if(!el)return;
  el.className='sync-pill '+s;
  t.textContent=s==='ok'?'Sincronizado':s==='loading'?'Cargando':'Error';
}

// ── LOAD ALL ──────────────────────────────────────────────────
async function loadAll(){
  setSyncState('loading');
  try{
    const { data:rech, error:e1 } = await sb
      .from('cheques').select('*').eq('hoja','RECHAZADOS')
      .order('fecha_rechazo',{ascending:false});
    if(e1) throw new Error(e1.message);
    const { data:canc } = await sb
      .from('cheques').select('*').eq('hoja','CANCELADOS')
      .order('fecha_rechazo',{ascending:false});
    S.rechazados=(rech||[]).map(mapRow);
    S.cancelados=(canc||[]).map(mapRow);
    S.kpis=recalcKPIs(S.rechazados);
    setSyncState('ok');
    render();
    toast('✓ '+S.rechazados.length+' rechazados · '+S.cancelados.length+' cancelados','success');
  }catch(e){
    setSyncState('error');
    toast('Error: '+e.message,'error');
  }
}

function mapRow(r){
  return {
    id:r.id, fila:r.id,
    cliente:r.cliente||'',
    emision:fmtDateAR(r.emision),
    vencimiento:fmtDateAR(r.vencimiento),
    tipo:r.tipo||'Electronico',
    tipoLetra:r.tipo_letra||'V',
    nroCheque:r.nro_cheque||'',
    fechaRechazo:fmtDateAR(r.fecha_rechazo),
    mes:r.mes||'', anio:r.anio?String(r.anio):'',
    motivo:r.motivo||'',
    importe:Number(r.importe)||0,
    gastos:Number(r.gastos)||0,
    total:Number(r.total)||0,
    detalle:r.detalle||'',
    aviso:fmtDateAR(r.aviso),
    tipoCancelacion:r.tipo_cancelacion||'',
    cancelacion:fmtDateAR(r.cancelacion),
    importeCancelacion:Number(r.importe_cancelacion)||0,
    pendiente:Number(r.pendiente)||0,
    envio:r.envio||'', cacDev:r.cac_dev||'',
    diasMora:Number(r.dias_mora)||0,
    evidenciaUrl:r.evidencia_url||'',
    emisor:r.emisor||'', detalleTexto:r.detalle||'',
  };
}

function fmtDateAR(d){
  if(!d)return'';
  // Supabase devuelve YYYY-MM-DD o YYYY-MM-DDTHH:MM:SS
  const s=String(d).split('T')[0].trim();
  const p=s.split('-');
  if(p.length===3&&p[0].length===4)return p[2]+'/'+p[1]+'/'+p[0];
  // Si ya viene DD/MM/YYYY lo devuelve igual
  if(s.includes('/'))return s;
  return s;
}

function showTab(t){

}

}

function applyFilters(){
  let rows=S.rechazados;
  if(S.q){const q=S.q.toLowerCase();rows=rows.filter(r=>[r.cliente,r.nroCheque,r.motivo,r.detalle].some(f=>f?.toLowerCase().includes(q)));}
  if(S.mot)rows=rows.filter(r=>r.motivo===S.mot);
  if(S.anio)rows=rows.filter(r=>r.anio===S.anio);
  if(S.cli)rows=rows.filter(r=>r.cliente===S.cli);
  if(S.sortF){rows=[...rows].sort((a,b)=>{const va=a[S.sortF],vb=b[S.sortF];const c=typeof va==='number'?va-vb:String(va||'').localeCompare(String(vb||''));return S.sortD==='asc'?c:-c;});}
  S.filtered=rows;
}
function refreshTbl(){applyFilters();const w=document.getElementById('tWrap');if(w){w.innerHTML=renderTabla(S.filtered);document.getElementById('cBadge').textContent=S.filtered.length+' / '+S.rechazados.length;}}

function onFiltro(k,v){S[k]=v;refreshTbl();}
function sortBy(f){S.sortD=S.sortF===f&&S.sortD==='desc'?'asc':'desc';S.sortF=f;refreshTbl();}

async function saveRow(id,imp,gas){
  const btn=document.getElementById('btnSave');
  btn.disabled=true;btn.textContent='Guardando...';
  const canc=parseFloat(document.getElementById('fImporte').value)||0;
  const detalleVal=document.getElementById('fDetalle').value;
  const campos={
    tipo_cancelacion:   document.getElementById('fTipo').value||null,
    importe_cancelacion:canc,
    cancelacion:        document.getElementById('fFechaCan').value||null,
    aviso:              document.getElementById('fAviso').value||null,
    emisor:             document.getElementById('fEmisor')?.value||null,
    detalle:            detalleVal==='Pago a proveedores'?(document.getElementById('fDetalleTexto')?.value?.trim()||detalleVal):detalleVal,
    envio:              document.getElementById('fEnvio').value||null,
    cac_dev:            document.getElementById('fCac').value||null,
    pendiente:          imp+gas-canc,
  };
  Object.keys(campos).forEach(k=>{if(campos[k]==='')campos[k]=null;});
  const {error}=await sb.from('cheques').update(campos).eq('id',id);
  if(error){toast('Error: '+error.message,'error');btn.disabled=false;btn.textContent='Guardar';return;}
  const idx=S.rechazados.findIndex(r=>r.id===id);
  if(idx>=0)Object.assign(S.rechazados[idx],{
    tipoCancelacion:campos.tipo_cancelacion,
    importeCancelacion:canc,
    cancelacion:fmtDateAR(campos.cancelacion),
    aviso:fmtDateAR(campos.aviso),
    emisor:campos.emisor,
    detalle:campos.detalle,
    envio:campos.envio||'',
    cacDev:campos.cac_dev||'',
    pendiente:campos.pendiente,
  });
  S.kpis=recalcKPIs(S.rechazados);
  registrarLog('MODIFICACION',{chequeId:id,cambios:campos,detalle:'Actualización de registro'});
  closeModal();toast('✓ Guardado','success');render();
}

// ── RECALC KPIs ───────────────────────────────────────────────
function recalcKPIs(rows){
  const act=rows.filter(r=>r.pendiente>0);
  const pend=act.reduce((s,r)=>s+r.pendiente,0);
  const imp=rows.reduce((s,r)=>s+r.importe,0);
  const gas=rows.reduce((s,r)=>s+r.gastos,0);
  const mora=act.length?act.reduce((s,r)=>s+(r.diasMora||0),0)/act.length:0;
  const porMotivo={};rows.forEach(r=>{if(!porMotivo[r.motivo])porMotivo[r.motivo]={cantidad:0,importe:0};porMotivo[r.motivo].cantidad++;porMotivo[r.motivo].importe+=r.pendiente;});
  const porCliente={};rows.forEach(r=>{if(!r.cliente)return;if(!porCliente[r.cliente])porCliente[r.cliente]={cantidad:0,pendiente:0};porCliente[r.cliente].cantidad++;porCliente[r.cliente].pendiente+=r.pendiente;});
  const topClientes=Object.entries(porCliente).map(([nombre,d])=>({nombre,...d})).sort((a,b)=>b.pendiente-a.pendiente).slice(0,8);
  return{totalPendiente:pend,totalImporte:imp,totalGastos:gas,cantidadActivos:act.length,cantidadTotal:rows.length,moraProm:Math.round(mora),porMotivo,topClientes};
}

  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);

}

async function consultarCUIT(){
  const cuit = (document.getElementById('cuitInput')?.value||'').replace(/[^0-9]/g,'').trim();
  if(!cuit || cuit.length < 10){
    toast('Ingresá un CUIT/CUIL válido (10-11 dígitos)','error');
    return;
  }
  const btn = document.getElementById('btnConsultar');
  const result = document.getElementById('crediticioResult');
  btn.disabled = true;
  result.innerHTML = `<div class="card"><div style="display:flex;align-items:center;gap:12px;color:var(--txt2)">
    <div class="spinner" style="width:20px;height:20px;border-width:2px;flex-shrink:0"></div>
    <span style="font-size:12px;font-weight:600">Consultando Central de Deudores BCRA...</span>
  </div></div>`;

  try{
    // Consulta deudas actuales (via Supabase Edge Function bcra-proxy)
    // Deudas → Supabase Edge Function con fallback a Cloudflare Worker
    const PROXY_SB = 'https://qqmzhwifrkgfrgewmpig.supabase.co/functions/v1/bcra-proxy';
    const PROXY_CF = 'https://bcra-proxy.marcevsanti.workers.dev';
    const fetchDeudas = async (cuit) => {
      try {
        const r = await fetch(PROXY_SB+'?endpoint=Deudas/'+cuit);

        const d = await r.json();
        if(!d || d.error) throw new Error('sb_empty');

        const r2 = await fetch(PROXY_CF+'?endpoint=Deudas/'+cuit);
        if(!r2.ok) return null;
        return await r2.json();

    };
    const [resDeudas, resCheques] = await Promise.all([

    result.innerHTML = buildCrediticioHTML(cuit, resDeudas, resCheques);

function buildCrediticioHTML(cuit, deudas, cheques){

    2: {label:'Riesgo Bajo',                     color:'#86efac',          bg:'rgba(22,163,74,.05)',    brd:'rgba(74,222,128,.1)'},

  }
  html += '</div>';

  return html;
}


async function procesarNosis(input){
  const file = input.files[0];
  if(!file) return;
  const result = document.getElementById('nosisResult');
  
  const apiKey = localStorage.getItem('gemini_key')||'';
  if(!apiKey){
    result.innerHTML = '<div style="background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:14px;font-size:11px;color:#f87171">⚠ Configurá tu API Key de Gemini en Configuración antes de usar esta función.</div>';
    return;
  }

  result.innerHTML = '<div style="display:flex;align-items:center;gap:10px;color:var(--txt2);font-size:12px"><div class="spinner" style="width:18px;height:18px;border-width:2px;flex-shrink:0"></div><span>Analizando informe Nosis con IA... puede tardar unos segundos</span></div>';
  input.value = '';

  try {
    // Convertir PDF a base64
    const base64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = () => rej(new Error('Error al leer el archivo'));
      r.readAsDataURL(file);
    });

    const prompt = `Sos un analista crediticio experto en informes de Nosis Manager argentino.
Analizá este informe PDF de Nosis Manager y generá un análisis crediticio estructurado en formato JSON.

Devolvé SOLO un objeto JSON válido (sin markdown, sin texto extra) con esta estructura exacta:
{
  "denominacion": "nombre completo",
  "cuit": "XX-XXXXXXXX-X",
  "fechaInforme": "DD/MM/AAAA",
  "score": {
    "valor": 0,
    "maximo": 999,
    "interpretacion": "texto breve"
  },
  "situacionBCRA": {
    "numero": 0,
    "descripcion": "texto",
    "color": "normal|bajo|medio|alto|irrecuperable"
  },
  "nivelDeuda": {
    "totalSistemaFinanciero": 0,
    "compromisoMensual": 0,
    "entidades": [
      {"nombre": "...", "situacion": 0, "monto": 0, "porcentaje": 0}
    ]
  },
  "chequesRechazados": {
    "totalCantidad": 0,
    "totalMonto": 0,
    "abonados": 0,
    "porcentajeAbonado": 0,
    "actitudPago": "Pagó|No pagó|Pagó parcialmente",
    "resumenPorBanco": [
      {"banco": "...", "cantidad": 0, "monto": 0, "pagados": 0}
    ],
    "estadisticaMensual": [
      {"periodo": "MM/AAAA", "cantidad": 0, "monto": 0}
    ]
  },
  "evolucionAntecedentes": {
    "tendencia": "mejorando|estable|empeorando",
    "descripcion": "texto breve de evolución",
    "situacionesUltimos12meses": [
      {"periodo": "MM/AAAA", "situacion": 0}
    ]
  },
  "consultasNosis": {
    "ultimos3meses": 0,
    "ultimos12meses": 0
  },
  "relacionesVinculadas": [
    {"nombre": "...", "cuit": "...", "vinculo": "..."}
  ],
  "resultadoCDA": "Aprobado|Observado|Rechazado",
  "alertas": ["lista de alertas o puntos de atención importantes"],
  "resumenEjecutivo": "párrafo de 3-4 líneas con conclusión crediticia para un operador de tesorería"
}`;

    const resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+apiKey, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        contents: [{parts: [
          {inline_data: {mime_type: 'application/pdf', data: base64}},
          {text: prompt}
        ]}],
        generationConfig: {responseMimeType: 'application/json', temperature: 0.1}
      })
    });

    if(!resp.ok) throw new Error('Error Gemini: '+resp.status);
    const data = await resp.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const info = JSON.parse(text.replace(/```json|```/g,'').trim());

    result.innerHTML = buildNosisHTML(info);

  } catch(e) {
    result.innerHTML = '<div style="background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:14px;font-size:11px;color:#f87171">⚠ Error al procesar el informe: '+e.message+'</div>';
  }
}

    h += '<div style="font-family:JetBrains Mono,monospace;font-size:14px;font-weight:700;color:'+(active?sitCols[i]:'var(--txt3)')+'">'+i+'</div>';
    h += '<div style="font-size:8px;color:'+(active?sitCols[i]:'var(--txt3)')+';font-weight:'+(active?'700':'400')+'">'+sitLabels[i]+'</div>';

      const sc = sitColors[s.situacion]||{color:'var(--txt3)'};
      h += '<div style="background:rgba(0,0,0,.2);border:1px solid var(--brd2);border-radius:4px;padding:4px 8px;text-align:center">';
      h += '<div style="font-size:8px;color:var(--txt3)">'+s.periodo+'</div>';
      h += '<div style="font-family:JetBrains Mono,monospace;font-size:13px;font-weight:700;color:'+sc.color+'">'+s.situacion+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }
  h += '</div>';

  // ── ALERTAS ──
  if(d.alertas?.length){
    h += '<div style="background:rgba(251,146,60,.06);border:1px solid rgba(251,146,60,.2);border-radius:10px;padding:14px;margin-bottom:10px">';
    h += '<div style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#fb923c;margin-bottom:8px">⚠ Alertas</div>';
    d.alertas.forEach(function(a){
      h += '<div style="font-size:11px;color:var(--txt2);margin-bottom:4px;display:flex;gap:6px"><span style="color:#fb923c;flex-shrink:0">·</span>'+a+'</div>';

    h += '</div>';

  // ── RESUMEN EJECUTIVO ──
  h += '<div style="background:var(--surf2);border:1px solid var(--brd2);border-radius:10px;padding:16px">';
  h += '<div style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px">Resumen Ejecutivo</div>';
  h += '<div style="font-size:12px;color:var(--txt2);line-height:1.7">'+d.resumenEjecutivo+'</div>';
  h += '</div>';

  return h;
}

async function cargarLog(){

  const usuario = document.getElementById('logFiltroUsuario')?.value || '';

  let query = sb.from('logs').select('*').order('created_at',{ascending:false}).limit(200);
  if(accion)  query = query.eq('accion', accion);
  if(usuario) query = query.eq('usuario_email', usuario);

  const {data, error} = await query;
  const wrap = document.getElementById('logWrap');
  if(!wrap) return;

  if(error){ wrap.innerHTML=`<div class="empty"><p>Error: ${error.message}</p></div>`; return; }
  if(!data||!data.length){ wrap.innerHTML=`<div class="empty"><p>Sin registros</p><span>No hay actividad registrada todavía</span></div>`; return; }

  // Poblar filtro usuarios
  const uSelect = document.getElementById('logFiltroUsuario');

    'LOGOUT':               '',

  wrap.innerHTML = `<div class="tbl-scroll"><table>
    <thead><tr>
      <th style="text-align:left;padding:10px 14px;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3)">Fecha / Hora</th>
      <th style="text-align:left;padding:10px 14px;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3)">Usuario</th>

      <th style="text-align:left;padding:10px 14px;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3)">Cheque / Cliente</th>
      <th style="text-align:left;padding:10px 14px;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3)">Campo</th>
      <th style="text-align:left;padding:10px 14px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3)">Antes</th>
      <th style="text-align:left;padding:10px 14px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3)">Después</th>
    </tr></thead>
    <tbody>

      const tag = accionColors[r.accion] || '';
      // Si tiene cambios JSON, mostrar los campos

      if(r.cambios && typeof r.cambios === 'object'){

function buildResumen(){
  // Solo pendientes > 0
  const rows = S.rechazados.filter(r => r.pendiente > 0);

  // Años disponibles ordenados
  const anios = [...new Set(rows.map(r => r.anio).filter(Boolean))].sort();

  // Agrupar: motivo → cliente → anio → suma pendiente
  const data = {};
  rows.forEach(r => {
    const mot = r.motivo || 'SIN MOTIVO';
    const cli = r.cliente || 'SIN CLIENTE';
    const anio = r.anio || 'S/F';
    if(!data[mot]) data[mot] = {};
    if(!data[mot][cli]) data[mot][cli] = {};
    if(!data[mot][cli][anio]) data[mot][cli][anio] = 0;
    data[mot][cli][anio] += r.pendiente;
  });

  // Construir HTML tabla
  const colAnios = anios;
  let html = `<div class="tbl-scroll"><table style="min-width:700px">
    <thead>
      <tr style="background:var(--surf2);border-bottom:2px solid var(--brd2)">
        <th style="text-align:left;padding:10px 16px;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3);min-width:200px">Motivo / Cliente</th>
        ${colAnios.map(a=>`<th style="text-align:right;padding:10px 16px;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3)">${a}</th>`).join('')}
        <th style="text-align:right;padding:10px 16px;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--red)">TOTAL</th>
      </tr>
    </thead>
    <tbody>`;

  // Ordenar motivos
  const motivos = Object.keys(data).sort();
  let grandTotal = {};
  colAnios.forEach(a => grandTotal[a] = 0);
  grandTotal['total'] = 0;

  motivos.forEach(mot => {
    const clientes = Object.keys(data[mot]).sort();

    // Subtotal del motivo
    let motTotals = {};
    colAnios.forEach(a => motTotals[a] = 0);
    clientes.forEach(cli => {
      colAnios.forEach(a => {
        motTotals[a] += data[mot][cli][a] || 0;
      });
    });
    const motTotal = colAnios.reduce((s,a) => s + motTotals[a], 0);

    // Fila de motivo (subtotal — estilo cabecera)
    html += `<tr style="background:rgba(212,0,10,.06);border-top:1px solid var(--brd2)">
      <td style="padding:10px 16px;font-size:11px;font-weight:700;color:var(--red);letter-spacing:.06em;text-transform:uppercase">${mot}</td>
      ${colAnios.map(a => `<td style="text-align:right;padding:10px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#fff">${motTotals[a]>0?fmt(motTotals[a]):'—'}</td>`).join('')}
      <td style="text-align:right;padding:10px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--red)">${fmt(motTotal)}</td>
    </tr>`;

    // Filas de clientes
    clientes.forEach(cli => {
      const cliTotal = colAnios.reduce((s,a) => s + (data[mot][cli][a]||0), 0);
      html += `<tr style="border-bottom:1px solid rgba(255,255,255,.03)" onmouseover="this.style.background='rgba(255,255,255,.02)'" onmouseout="this.style.background=''">
        <td style="padding:8px 16px 8px 28px;font-size:12px;color:var(--txt2)">${cli}</td>
        ${colAnios.map(a => `<td style="text-align:right;padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;color:${data[mot][cli][a]>0?'var(--txt)':'var(--txt3)'}">${data[mot][cli][a]>0?fmt(data[mot][cli][a]):'—'}</td>`).join('')}
        <td style="text-align:right;padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#fff">${fmt(cliTotal)}</td>
      </tr>`;
    });

    // Acumular grand total
    colAnios.forEach(a => { grandTotal[a] += motTotals[a]; });
    grandTotal['total'] += motTotal;
  });

  // Fila grand total
  html += `<tr style="background:var(--surf2);border-top:2px solid var(--brd2)">
    <td style="padding:12px 16px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.1em;color:#fff">TOTAL GENERAL</td>
    ${colAnios.map(a => `<td style="text-align:right;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#fff">${grandTotal[a]>0?fmt(grandTotal[a]):'—'}</td>`).join('')}
    <td style="text-align:right;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--red)">${fmt(grandTotal['total'])}</td>
  </tr>`;

  html += '</tbody></table></div>';

  // Guardar para export
  S._resumenData = { data, anios, grandTotal };

  document.getElementById('resumenWrap').innerHTML = html;
}

function exportResumenCSV(){
  if(!S._resumenData){toast('Generá el resumen primero','info');return;}
  var rd=S._resumenData, rows=[['MOTIVO / CLIENTE'].concat(rd.anios).concat(['TOTAL'])];
  Object.keys(rd.data).sort().forEach(function(mot){
    var clientes=Object.keys(rd.data[mot]).sort(), motT={};
    rd.anios.forEach(function(a){motT[a]=0;});
    clientes.forEach(function(cli){rd.anios.forEach(function(a){motT[a]+=(rd.data[mot][cli][a]||0);});});
    var motTotal=rd.anios.reduce(function(s,a){return s+motT[a];},0);
    rows.push([mot].concat(rd.anios.map(function(a){return motT[a]||0;})).concat([motTotal]));
    clientes.forEach(function(cli){
      var ct=rd.anios.reduce(function(s,a){return s+(rd.data[mot][cli][a]||0);},0);
      rows.push(['  '+cli].concat(rd.anios.map(function(a){return rd.data[mot][cli][a]||0;})).concat([ct]));
    });
  });
  rows.push(['TOTAL GENERAL'].concat(rd.anios.map(function(a){return rd.grandTotal[a]||0;})).concat([rd.grandTotal['total']]));
  var csv=rows.map(function(r){return r.map(function(v){return typeof v==='number'?v.toFixed(2):'"'+String(v)+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='resumen_moretti_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV exportado','success');
}

function handleDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)handleFile(f);}

async function handleFile(file){
  const prev=document.getElementById('importPreview');
  prev.innerHTML=`<div class="card" style="margin-top:16px"><div style="display:flex;align-items:center;gap:10px;color:var(--txt2)"><div class="spinner" style="width:20px;height:20px;border-width:2px"></div><span>Leyendo archivo...</span></div></div>`;
  try{
    const XLSX=await loadSheetJS();
    const data=await file.arrayBuffer();
    const wb=XLSX.read(data,{type:'array',cellDates:true});
    const sn=wb.SheetNames.find(n=>n.toUpperCase().includes('RECHAZADO'));
    if(!sn){prev.innerHTML='<div class="card"><p style="color:#f87171">No se encontró solapa RECHAZADOS</p></div>';return;}
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,raw:false,dateNF:'dd/mm/yyyy'});
    const dataRows=rows.slice(3).filter(r=>r[0]||r[5]);
    prev.innerHTML=`<div class="card" style="margin-top:16px">
      <div class="card-title">Vista previa — ${dataRows.length} registros</div>
      <button class="btn-save" style="margin-top:12px" id="btnImport">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Importar ${dataRows.length} registros a Supabase
      </button>
    </div>`;
    document.getElementById('btnImport').onclick=()=>confirmarImport(dataRows);
  }catch(e){prev.innerHTML='<div class="card"><p style="color:#f87171">Error: '+e.message+'</p></div>';}
}

async function loadSheetJS(){
  if(window.XLSX)return window.XLSX;
  return new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=()=>res(window.XLSX);s.onerror=rej;document.head.appendChild(s);});
}

async function confirmarImport(rawRows){
  const btn=document.getElementById('btnImport');
  btn.disabled=true;btn.textContent='Importando...';
  const meses=['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
  const rows=rawRows.map(r=>{
    const imp=parseFloat(String(r[10]||'').replace(/[^0-9.-]/g,''))||0;
    const gas=parseFloat(String(r[11]||'').replace(/[^0-9.-]/g,''))||0;
    return{
      cliente:r[0]||'',nro_cheque:String(r[5]||''),
      tipo:r[3]||'Electronico',tipo_letra:r[4]||'V',
      mes:r[7]||'',anio:parseInt(r[8])||null,
      motivo:r[9]||'',importe:imp,gastos:gas,total:imp+gas,
      pendiente:parseFloat(String(r[18]||'').replace(/[^0-9.-]/g,''))||imp+gas,
      detalle:r[13]||'',emisor:r[23]||null,hoja:'RECHAZADOS',created_by:_userId,
    };
  }).filter(r=>r.cliente&&r.nro_cheque);
  const {error}=await sb.from('cheques').insert(rows);
  if(error){toast('Error: '+error.message,'error');btn.disabled=false;btn.textContent='Importar';return;}
  toast('✓ '+rows.length+' registros importados','success');
  await loadAll();showTab('rechazados');
}

async function ncAiHandleFile(file){
  if(!file)return;
  const status=document.getElementById('ncAiStatus');
  if(!status)return;
  const apiKey=localStorage.getItem('gemini_key')||'';
  if(!apiKey){status.innerHTML=`<div style="margin-top:14px;padding:14px;background:rgba(212,0,10,.08);border:1px solid rgba(212,0,10,.2);border-radius:8px;font-size:12px;color:#f87171">Falta la API Key de Gemini. Andá a Configuración.</div>`;return;}
  status.innerHTML=`<div style="display:flex;align-items:center;gap:12px;margin-top:16px;padding:16px;background:var(--surf2);border-radius:8px"><div class="spinner" style="width:20px;height:20px;border-width:2px;flex-shrink:0"></div><span style="font-size:12px;color:var(--txt2)">La IA está leyendo el comprobante...</span></div>`;
  try{
    const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
    const mimeType=file.type==='application/pdf'?'application/pdf':(file.type||'image/jpeg');
    const prompt='Sos un asistente de tesoreria argentina. Analiza este comprobante bancario de cheque rechazado. Devuelve UNICAMENTE un objeto JSON valido, sin markdown: {"cliente":"nombre","nroCheque":"numero","tipo":"Electronico","emision":"dd/mm/yyyy","vencimiento":"dd/mm/yyyy","fechaRechazo":"dd/mm/yyyy","motivo":"SIN FONDOS","importe":0} Motivos validos: SIN FONDOS, CTA CERRADA, CUENTA EMBARGADA, MAL CONFECCIONADO, CUENTA CONCURSADA, VENCIDO, MAL ENDOSADO, CUENTA INEXISTENTE.';
    const resp=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+apiKey,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:mimeType,data:base64}},{text:prompt}]}]})});
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    const txt=(data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('').trim();
    const match=txt.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('No se encontró JSON');
    const parsed=JSON.parse(match[0]);
    status.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-top:14px;padding:10px 14px;background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.15);border-radius:8px;font-size:12px;color:#86efac"><svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;flex-shrink:0" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Datos leídos — revisá antes de guardar</div>`;
    _ncEvidenciaFile=file;_ncEvidenciaBase64=base64;_ncEvidenciaMime=mimeType;
    renderNcManual(parsed,true);
  }catch(e){
    status.innerHTML=`<div style="margin-top:14px;padding:12px;background:rgba(212,0,10,.06);border:1px solid rgba(212,0,10,.2);border-radius:8px;font-size:12px;color:#f87171">Error: ${e.message}</div>`;
  }
}

async function guardarNuevoCheque(){
  const cliente=document.getElementById('nCliente')?.value?.trim();
  const nroCheque=document.getElementById('nNroCheque')?.value?.trim();
  const importe=parseFloat(document.getElementById('nImporte')?.value||0);
  if(!cliente){toast('El cliente es obligatorio','error');return;}
  if(!nroCheque){toast('El N° de cheque es obligatorio','error');return;}
  if(!importe||importe<=0){toast('El importe debe ser mayor a 0','error');return;}
  const btn=event.target.closest('button');
  btn.disabled=true;btn.textContent='Verificando...';
  const fechaRec=document.getElementById('nFechaRechazo')?.value||'';
  const gastos=parseFloat(document.getElementById('nGastos')?.value||0)||0;
  const total=importe+gastos;
  const meses=['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
  let mes='',anio=null;
  if(fechaRec){const dt=new Date(fechaRec);mes=meses[dt.getMonth()];anio=dt.getFullYear();}
  // Validar duplicado
  const {data:dup}=await sb.from('cheques').select('id,cliente,fecha_rechazo,motivo,importe').eq('nro_cheque',nroCheque).eq('hoja','RECHAZADOS');
  if(dup&&dup.length>0){
    btn.disabled=false;btn.textContent='Guardar en RECHAZADOS';
    showDuplicateWarning({cliente:dup[0].cliente,fechaRechazo:fmtDateAR(dup[0].fecha_rechazo),motivo:dup[0].motivo,importe:dup[0].importe},{nroCheque,cliente,importe,gastos,total,mes,anio,fechaRec},btn,nroCheque);
    return;
  }
  await _insertarCheque({nroCheque,cliente,importe,gastos,total,mes,anio,fechaRec},btn,false);
}

async function _insertarCheque(d,btn,forzar){
  if(btn){btn.disabled=true;btn.textContent='Guardando...';}
  const detalleVal=document.getElementById('nDetalle')?.value||'';
  const row={
    cliente:document.getElementById('nCliente')?.value?.trim()||d.cliente,
    nro_cheque:d.nroCheque,
    tipo:document.getElementById('nTipo')?.value||'Electronico',
    tipo_letra:'V',
    emision:document.getElementById('nEmision')?.value||null,
    vencimiento:document.getElementById('nVencimiento')?.value||null,
    fecha_rechazo:d.fechaRec||null,
    mes:d.mes,anio:d.anio,
    motivo:document.getElementById('nMotivo')?.value||'',
    importe:d.importe,gastos:d.gastos,total:d.total,
    detalle:detalleVal==='Pago a proveedores'?(document.getElementById('nDetalleTexto')?.value?.trim()||detalleVal):detalleVal,
    emisor:document.getElementById('nEmisor')?.value||null,
    pendiente:_ncDest==='cancelados'?0:d.total,
    hoja:_ncDest==='cancelados'?'CANCELADOS':'RECHAZADOS',
    created_by:_userId,
  };
  Object.keys(row).forEach(k=>{if(row[k]==='')row[k]=null;});
  const {error}=await sb.from('cheques').insert(row);
  if(error){toast('Error: '+error.message,'error');if(btn){btn.disabled=false;btn.textContent='Guardar';}return;}
  closeModal();
  toast('✓ Cheque '+d.nroCheque+' guardado','success');
  registrarLog('ALTA',{nroCheque:d.nroCheque,cliente:row.cliente,detalle:'Nuevo cheque cargado en '+row.hoja});
  await loadAll();showTab(_ncDest);
}

  const modal=document.querySelector('.modal');
  if(modal){const ftr=document.getElementById('ncStickyFtr');if(ftr)modal.insertBefore(warn,ftr);else modal.appendChild(warn);warn.scrollIntoView({behavior:'smooth',block:'nearest'});}
  document.getElementById('dupBtnCancelar').onclick=function(){warn.remove();};
  document.getElementById('dupBtnForzar').onclick=function(){warn.remove();_insertarCheque(d,btn,true);};
}

// ── HELPERS ───────────────────────────────────────────────────
function fmt(n){if(!n&&n!==0)return'—';return'$'+Number(n).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtK(n){if(!n)return'—';if(n>=1000000)return'$'+(n/1000000).toFixed(1)+'M';if(n>=1000)return'$'+(n/1000).toFixed(0)+'k';return'$'+n.toFixed(0);}
function toDate(d){if(!d)return'';const p=d.split('/');return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:d.includes('-')?d:'';}
function fromDate(d){if(!d)return'';const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:'';}
function esc(s){return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function toast(msg,type='info'){
  const c=document.getElementById('toasts'),t=document.createElement('div');
  t.className='toast '+type;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}
